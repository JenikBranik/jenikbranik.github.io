<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Odkazy</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 10vh; 
            background-color: #f4f4f9; 
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 30px; }
        .btn { 
            display: block; 
            width: 100%; 
            box-sizing: border-box;
            margin: 15px 0; 
            padding: 15px; 
            text-decoration: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .linkedin { background-color: #0077b5; }
        .github { background-color: #333; }
        .email { background-color: #d44638; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jan Novák</h1>
        <p>Vývojář & IT nadšenec</p>

        <a href="https://linkedin.com/in/TVUJ_PROFIL" class="btn linkedin" target="_blank">LinkedIn</a>
        <a href="https://github.com/TVUJ_NICK" class="btn github" target="_blank">GitHub</a>
        <a href="mailto:tvuj@email.cz" class="btn email">Napsat e-mail</a>
    </div>
</body>
</html>
